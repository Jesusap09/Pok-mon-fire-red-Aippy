<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pokémon Fire Red">
    <meta name="theme-color" content="#667eea">
    <title>Pokémon Fire Red - GBA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .header {
            flex-shrink: 0;
            text-align: center;
            padding: 5px 10px 3px;
            background: rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.1em;
            color: white;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 0.65em;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .screen-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 6px;
        }

        .emulator-frame {
            background: #000;
            border-radius: 8px;
            padding: 4px;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 3/2;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 100%;
        }

        .controls-section {
            flex-shrink: 0;
            padding: 6px 8px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .file-section {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        button {
            padding: 8px;
            font-size: 0.75em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-reset {
            background: rgba(244, 67, 54, 0.7);
            border: 2px solid rgba(244, 67, 54, 0.9);
            flex: 1;
            padding: 6px;
            font-size: 0.7em;
        }

        .btn-reset:active {
            transform: scale(0.95);
            background: rgba(244, 67, 54, 0.9);
        }

        .gamepad {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7em;
            text-align: center;
            min-height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error {
            background: rgba(244, 67, 54, 0.9) !important;
        }

        .success {
            background: rgba(76, 175, 80, 0.9) !important;
        }

        .loading {
            background: rgba(102, 126, 234, 0.9) !important;
        }

        /* Controles en grid 2 líneas */
        .gamepad-grid {
            display: grid;
            grid-template-columns: 45% 45%;
            gap: 6px;
            justify-content: space-between;
        }

        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            aspect-ratio: 1;
        }

        .dpad-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            color: white;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            padding: 0;
            min-height: 30px;
        }

        .dpad-btn:active {
            background: rgba(102, 126, 234, 0.8);
            transform: scale(0.92);
            border-color: #667eea;
        }

        .dpad-up {
            grid-column: 2;
            grid-row: 1;
        }

        .dpad-left {
            grid-column: 1;
            grid-row: 2;
        }

        .dpad-down {
            grid-column: 2;
            grid-row: 3;
        }

        .dpad-right {
            grid-column: 3;
            grid-row: 2;
        }

        .button-pair {
            display: flex;
            gap: 4px;
            align-items: stretch;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            padding: 0;
            flex: 1;
            min-width: 35px;
        }

        .action-btn:active {
            background: rgba(102, 126, 234, 0.8);
            transform: scale(0.92);
            border-color: #667eea;
        }

        .btn-a {
            background: rgba(76, 175, 80, 0.3) !important;
            border-color: rgba(76, 175, 80, 0.6) !important;
        }

        .btn-a:active {
            background: rgba(76, 175, 80, 0.8) !important;
        }

        .btn-b {
            background: rgba(244, 67, 54, 0.3) !important;
            border-color: rgba(244, 67, 54, 0.6) !important;
        }

        .btn-b:active {
            background: rgba(244, 67, 54, 0.8) !important;
        }

        .shoulder-row {
            display: flex;
            gap: 4px;
        }

        .shoulder-btn {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            font-size: 0.65em;
            color: white;
            font-weight: bold;
        }

        .shoulder-btn:active {
            background: rgba(102, 126, 234, 0.8);
            transform: scale(0.95);
            border-color: #667eea;
        }

        .hidden {
            display: none !important;
        }

        @media (orientation: landscape) {
            .container {
                flex-direction: row;
                padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            }

            .header {
                padding: 4px;
                flex-shrink: 0;
                min-width: 120px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            h1 {
                font-size: 0.95em;
            }

            .subtitle {
                font-size: 0.6em;
            }

            .screen-container {
                flex: 1;
                padding: 4px;
            }

            .emulator-frame {
                padding: 3px;
                border-radius: 6px;
            }

            .controls-section {
                flex-shrink: 0;
                width: 110px;
                padding: 4px;
                gap: 4px;
            }

            .gamepad-grid {
                grid-template-columns: 1fr;
            }

            .dpad-container {
                max-width: 100%;
            }

            .btn-reset {
                font-size: 0.6em;
                padding: 4px;
            }

            .action-btn {
                width: 30px;
                height: 30px;
                font-size: 0.9em;
            }

            .status-bar {
                padding: 2px 4px;
                font-size: 0.6em;
                min-height: 16px;
            }
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Pokémon Fire Red</h1>
            <p class="subtitle">GBA</p>
        </div>

        <div class="screen-container">
            <div class="emulator-frame">
                <canvas id="gameCanvas" width="240" height="160"></canvas>
            </div>
        </div>

        <div class="controls-section">
            <div class="status-bar" id="status">⏳ Cargando ROM...</div>

            <div class="file-section">
                <button class="btn-reset" id="resetBtn" onclick="resetGame()">🔄 Reset</button>
            </div>

            <div class="gamepad">
                <div class="gamepad-grid">
                    <!-- D-Pad -->
                    <div class="dpad-container">
                        <button class="dpad-btn dpad-up" ontouchstart="padPress('up')" ontouchend="padRelease('up')" onmousedown="padPress('up')" onmouseup="padRelease('up')">⬆</button>
                        <button class="dpad-btn dpad-left" ontouchstart="padPress('left')" ontouchend="padRelease('left')" onmousedown="padPress('left')" onmouseup="padRelease('left')">⬅</button>
                        <button class="dpad-btn dpad-down" ontouchstart="padPress('down')" ontouchend="padRelease('down')" onmousedown="padPress('down')" onmouseup="padRelease('down')">⬇</button>
                        <button class="dpad-btn dpad-right" ontouchstart="padPress('right')" ontouchend="padRelease('right')" onmousedown="padPress('right')" onmouseup="padRelease('right')">➡</button>
                    </div>

                    <!-- Botones A/B -->
                    <div class="button-pair">
                        <button class="action-btn btn-b" ontouchstart="padPress('b')" ontouchend="padRelease('b')" onmousedown="padPress('b')" onmouseup="padRelease('b')">B</button>
                        <button class="action-btn btn-a" ontouchstart="padPress('a')" ontouchend="padRelease('a')" onmousedown="padPress('a')" onmouseup="padRelease('a')">A</button>
                    </div>
                </div>

                <!-- L y R -->
                <div class="shoulder-row" style="margin-top: 4px;">
                    <button class="shoulder-btn" ontouchstart="padPress('l')" ontouchend="padRelease('l')" onmousedown="padPress('l')" onmouseup="padRelease('l')">L</button>
                    <button class="shoulder-btn" ontouchstart="padPress('r')" ontouchend="padRelease('r')" onmousedown="padPress('r')" onmouseup="padRelease('r')">R</button>
                </div>

                <!-- SELECT y START -->
                <div class="shoulder-row" style="margin-top: 4px;">
                    <button class="shoulder-btn" ontouchstart="padPress('select')" ontouchend="padRelease('select')" onmousedown="padPress('select')" onmouseup="padRelease('select')">SEL</button>
                    <button class="shoulder-btn" ontouchstart="padPress('start')" ontouchend="padRelease('start')" onmousedown="padPress('start')" onmouseup="padRelease('start')">STR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mgba@0.10.0/dist/mgba.js"></script>
    <script>
        let emulator = null;
        const status = document.getElementById('status');
        const romPath = 'Pokemon - FireRed Version (USA).gba';

        function updateStatus(message, type = 'info') {
            status.textContent = message;
            status.className = 'status-bar';
            if (type === 'error') status.classList.add('error');
            if (type === 'success') status.classList.add('success');
            if (type === 'loading') status.classList.add('loading');
        }

        async function initEmulator() {
            try {
                updateStatus('⏳ Cargando ROM...', 'loading');

                // Cargar la ROM desde el repositorio
                console.log('Intentando cargar ROM desde:', romPath);
                
                const response = await fetch(romPath);
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const romData = await response.arrayBuffer();
                console.log('ROM cargada, tamaño:', romData.byteLength);

                // Inicializar emulador
                const canvas = document.getElementById('gameCanvas');
                emulator = new window.GameBoyAdvance();
                
                emulator.setCanvasScale(1);
                emulator.attachCanvas(canvas);
                emulator.loadBios();
                
                // Cargar ROM
                emulator.setRom(romData);
                emulator.reset();
                
                // Loop de renderizado
                const loop = () => {
                    emulator.step();
                    emulator.advanceFrame();
                    requestAnimationFrame(loop);
                };
                loop();

                updateStatus('▶️ Pokémon Fire Red', 'success');
                console.log('Emulador iniciado correctamente');

            } catch (error) {
                console.error('Error detallado:', error);
                updateStatus('❌ ' + error.message, 'error');
            }
        }

        function resetGame() {
            if (emulator) {
                try {
                    emulator.reset();
                    updateStatus('🔄 Reset completado', 'success');
                    setTimeout(() => {
                        updateStatus('▶️ Pokémon Fire Red', 'success');
                    }, 1000);
                } catch (error) {
                    console.error('Error en reset:', error);
                    updateStatus('❌ Error en reset', 'error');
                }
            }
        }

        function padPress(button) {
            if (!emulator) return;

            const keyMap = {
                'a': 0x0001,
                'b': 0x0002,
                'select': 0x0004,
                'start': 0x0008,
                'right': 0x0010,
                'left': 0x0020,
                'up': 0x0040,
                'down': 0x0080,
                'r': 0x0100,
                'l': 0x0200
            };

            if (keyMap[button]) {
                emulator.keyDown(keyMap[button]);
            }
        }

        function padRelease(button) {
            if (!emulator) return;

            const keyMap = {
                'a': 0x0001,
                'b': 0x0002,
                'select': 0x0004,
                'start': 0x0008,
                'right': 0x0010,
                'left': 0x0020,
                'up': 0x0040,
                'down': 0x0080,
                'r': 0x0100,
                'l': 0x0200
            };

            if (keyMap[button]) {
                emulator.keyUp(keyMap[button]);
            }
        }

        document.addEventListener('keydown', function(e) {
            if (!emulator) return;

            switch(e.key.toLowerCase()) {
                case 'arrowup': padPress('up'); e.preventDefault(); break;
                case 'arrowdown': padPress('down'); e.preventDefault(); break;
                case 'arrowleft': padPress('left'); e.preventDefault(); break;
                case 'arrowright': padPress('right'); e.preventDefault(); break;
                case 'z': padPress('a'); break;
                case 'x': padPress('b'); break;
                case 'q': padPress('l'); break;
                case 'w': padPress('r'); break;
                case 'enter': padPress('start'); break;
                case ' ': padPress('select'); e.preventDefault(); break;
            }
        });

        document.addEventListener('keyup', function(e) {
            if (!emulator) return;

            switch(e.key.toLowerCase()) {
                case 'arrowup': padRelease('up'); break;
                case 'arrowdown': padRelease('down'); break;
                case 'arrowleft': padRelease('left'); break;
                case 'arrowright': padRelease('right'); break;
                case 'z': padRelease('a'); break;
                case 'x': padRelease('b'); break;
                case 'q': padRelease('l'); break;
                case 'w': padRelease('r'); break;
                case 'enter': padRelease('start'); break;
                case ' ': padRelease('select'); break;
            }
        });

        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('load', initEmulator);

        document.addEventListener('touchstart', function() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        });
    </script>
</body>
</html>

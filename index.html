<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pokémon Fire Red">
    <meta name="theme-color" content="#FF0000">
    <title>Pokémon Fire Red</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body.fullscreen {
            width: 100vw;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .screen-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 10px;
        }

        .screen-wrapper {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 3/2;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
        }

        .controls-area {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .dpad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
        }

        .dpad-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
        }

        .dpad-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
        }

        .dpad-up { grid-column: 2; grid-row: 1; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }
        .dpad-right { grid-column: 3; grid-row: 2; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
        }

        .btn-a {
            background: rgba(76, 175, 80, 0.4);
            border-color: rgba(76, 175, 80, 0.8);
            color: #4caf50;
        }

        .btn-a:active {
            background: rgba(76, 175, 80, 0.7);
            transform: scale(0.9);
        }

        .btn-b {
            background: rgba(244, 67, 54, 0.4);
            border-color: rgba(244, 67, 54, 0.8);
            color: #f44336;
        }

        .btn-b:active {
            background: rgba(244, 67, 54, 0.7);
            transform: scale(0.9);
        }

        .shoulder-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
            min-width: 50px;
        }

        .shoulder-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .shoulder-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .status {
            text-align: center;
            color: #4caf50;
            font-size: 12px;
            padding: 4px;
            min-height: 16px;
            width: 100%;
        }

        .status.error {
            color: #f44336;
        }

        /* Landscape mode */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
                gap: 10px;
            }

            .screen-area {
                flex: 1;
                padding: 8px;
            }

            .screen-wrapper {
                max-width: 100%;
                max-height: 100%;
            }

            .controls-area {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
                max-width: 320px;
                overflow-y: auto;
            }

            .dpad {
                grid-template-columns: 45px 45px 45px;
                grid-template-rows: 45px 45px 45px;
                gap: 1px;
                padding: 6px;
            }

            .dpad-btn {
                font-size: 16px;
            }

            .btn-action {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }

            .shoulder-btn {
                padding: 6px 12px;
                font-size: 12px;
                min-width: 45px;
            }

            .shoulder-row {
                gap: 6px;
            }

            .action-row {
                gap: 10px;
            }
        }

        /* Para pantallas muy pequeñas */
        @media (max-width: 320px) {
            .dpad {
                grid-template-columns: 35px 35px 35px;
                grid-template-rows: 35px 35px 35px;
            }

            .btn-action {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }

            .shoulder-btn {
                padding: 4px 8px;
                font-size: 10px;
                min-width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="screen-area">
            <div class="screen-wrapper">
                <canvas id="gameCanvas" width="240" height="160"></canvas>
            </div>
        </div>

        <div class="controls-area">
            <div class="status" id="status">⏳ Cargando...</div>

            <!-- D-Pad -->
            <div class="dpad">
                <button class="dpad-btn dpad-up">⬆️</button>
                <button class="dpad-btn dpad-left">⬅️</button>
                <button class="dpad-btn dpad-down">⬇️</button>
                <button class="dpad-btn dpad-right">➡️</button>
            </div>

            <!-- Botones de acción -->
            <div class="action-buttons">
                <div class="action-row">
                    <button class="btn-action btn-b" id="btnB">B</button>
                    <button class="btn-action btn-a" id="btnA">A</button>
                </div>
                <div class="shoulder-row">
                    <button class="shoulder-btn" id="btnL">L</button>
                    <button class="shoulder-btn" id="btnR">R</button>
                </div>
                <div class="shoulder-row">
                    <button class="shoulder-btn" id="btnSel">SEL</button>
                    <button class="shoulder-btn" id="btnStr">STR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://gbjs.org/gba.js"></script>
    <script>
        let emulator = null;
        const canvas = document.getElementById('gameCanvas');
        const status = document.getElementById('status');

        console.log('Script iniciado');

        // Mapeo de teclas GBA
        const GBA_KEYS = {
            A: 0,
            B: 1,
            SELECT: 2,
            START: 3,
            RIGHT: 4,
            LEFT: 5,
            UP: 6,
            DOWN: 7,
            R: 8,
            L: 9
        };

        function setupButton(selector, key) {
            const btn = document.querySelector(selector);
            if (!btn) {
                console.warn('No se encontró el botón:', selector);
                return;
            }

            const handlePress = () => {
                if (emulator && emulator.keyboardHandler) {
                    emulator.keyboardHandler[key] = true;
                    navigator.vibrate && navigator.vibrate(20);
                }
            };

            const handleRelease = () => {
                if (emulator && emulator.keyboardHandler) {
                    emulator.keyboardHandler[key] = false;
                }
            };

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePress();
            });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleRelease();
            });

            btn.addEventListener('mousedown', handlePress);
            btn.addEventListener('mouseup', handleRelease);
            btn.addEventListener('mouseleave', handleRelease);
        }

        // Configurar todos los botones
        setupButton('.dpad-up', GBA_KEYS.UP);
        setupButton('.dpad-down', GBA_KEYS.DOWN);
        setupButton('.dpad-left', GBA_KEYS.LEFT);
        setupButton('.dpad-right', GBA_KEYS.RIGHT);
        setupButton('#btnA', GBA_KEYS.A);
        setupButton('#btnB', GBA_KEYS.B);
        setupButton('#btnL', GBA_KEYS.L);
        setupButton('#btnR', GBA_KEYS.R);
        setupButton('#btnSel', GBA_KEYS.SELECT);
        setupButton('#btnStr', GBA_KEYS.START);

        // Teclado
        const keyMap = {
            'ArrowUp': GBA_KEYS.UP,
            'ArrowDown': GBA_KEYS.DOWN,
            'ArrowLeft': GBA_KEYS.LEFT,
            'ArrowRight': GBA_KEYS.RIGHT,
            'z': GBA_KEYS.A,
            'Z': GBA_KEYS.A,
            'x': GBA_KEYS.B,
            'X': GBA_KEYS.B,
            'q': GBA_KEYS.L,
            'Q': GBA_KEYS.L,
            'w': GBA_KEYS.R,
            'W': GBA_KEYS.R,
            'Enter': GBA_KEYS.START,
            ' ': GBA_KEYS.SELECT
        };

        document.addEventListener('keydown', (e) => {
            if (emulator && emulator.keyboardHandler && keyMap[e.key] !== undefined) {
                emulator.keyboardHandler[keyMap[e.key]] = true;
                if (e.key === ' ') e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (emulator && emulator.keyboardHandler && keyMap[e.key] !== undefined) {
                emulator.keyboardHandler[keyMap[e.key]] = false;
                if (e.key === ' ') e.preventDefault();
            }
        });

        async function init() {
            try {
                status.textContent = '⏳ Cargando ROM...';

                console.log('Intentando cargar ROM');
                const romPath = 'Pokemon - FireRed Version (USA).gba';
                const response = await fetch(romPath);

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const romData = await response.arrayBuffer();
                console.log('ROM cargada, tamaño:', romData.byteLength, 'bytes');

                if (romData.byteLength === 0) {
                    throw new Error('ROM vacía');
                }

                console.log('Inicializando emulador');
                emulator = new window.GameBoyAdvance();

                if (!emulator) {
                    throw new Error('No se pudo crear instancia del emulador');
                }

                console.log('Emulador creado');
                emulator.setCanvasScale(1);
                emulator.attachCanvas(canvas);

                console.log('Cargando ROM en emulador');
                emulator.loadRom(new Uint8Array(romData));

                console.log('ROM cargada en emulador, iniciando game loop');

                // Game loop
                let frameCount = 0;
                const loop = () => {
                    try {
                        if (emulator) {
                            emulator.advanceFrame();
                            frameCount++;
                            if (frameCount % 60 === 0) {
                                console.log('Frames:', frameCount);
                            }
                        }
                    } catch (err) {
                        console.error('Error en game loop:', err);
                    }
                    requestAnimationFrame(loop);
                };
                loop();

                status.textContent = '▶️ Pokémon Fire Red';
                status.classList.remove('error');

                console.log('Emulador iniciado correctamente');

                // Pantalla completa en móviles
                if (window.innerWidth < 768) {
                    document.body.requestFullscreen?.().catch(() => {});
                }

            } catch (error) {
                console.error('Error en init:', error);
                status.textContent = '❌ ' + error.message;
                status.classList.add('error');
            }
        }

        if (document.readyState === 'loading') {
            window.addEventListener('load', init);
        } else {
            init();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pokémon Fire Red">
    <meta name="theme-color" content="#FF0000">
    <title>Pokémon Fire Red</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body.fullscreen {
            width: 100vw;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .screen-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 10px;
        }

        .screen-wrapper {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 3/2;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
        }

        .controls-area {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .dpad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
        }

        .dpad-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
        }

        .dpad-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
        }

        .dpad-up { grid-column: 2; grid-row: 1; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }
        .dpad-right { grid-column: 3; grid-row: 2; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
        }

        .btn-a {
            background: rgba(76, 175, 80, 0.4);
            border-color: rgba(76, 175, 80, 0.8);
            color: #4caf50;
        }

        .btn-a:active {
            background: rgba(76, 175, 80, 0.7);
            transform: scale(0.9);
        }

        .btn-b {
            background: rgba(244, 67, 54, 0.4);
            border-color: rgba(244, 67, 54, 0.8);
            color: #f44336;
        }

        .btn-b:active {
            background: rgba(244, 67, 54, 0.7);
            transform: scale(0.9);
        }

        .shoulder-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
            min-width: 50px;
        }

        .shoulder-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .shoulder-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .status {
            text-align: center;
            color: #4caf50;
            font-size: 12px;
            padding: 4px;
            min-height: 16px;
        }

        .status.error {
            color: #f44336;
        }

        /* Landscape mode */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
                gap: 10px;
            }

            .screen-area {
                flex: 1;
                padding: 8px;
            }

            .screen-wrapper {
                max-width: 100%;
                max-height: 100%;
            }

            .controls-area {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
                max-width: 320px;
                overflow-y: auto;
            }

            .dpad {
                grid-template-columns: 45px 45px 45px;
                grid-template-rows: 45px 45px 45px;
                gap: 1px;
                padding: 6px;
            }

            .dpad-btn {
                font-size: 16px;
            }

            .btn-action {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }

            .shoulder-btn {
                padding: 6px 12px;
                font-size: 12px;
                min-width: 45px;
            }

            .shoulder-row {
                gap: 6px;
            }

            .action-row {
                gap: 10px;
            }
        }

        /* Para pantallas muy pequeñas */
        @media (max-width: 320px) {
            .dpad {
                grid-template-columns: 35px 35px 35px;
                grid-template-rows: 35px 35px 35px;
            }

            .btn-action {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }

            .shoulder-btn {
                padding: 4px 8px;
                font-size: 10px;
                min-width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="screen-area">
            <div class="screen-wrapper">
                <canvas id="gameCanvas" width="240" height="160"></canvas>
            </div>
        </div>

        <div class="controls-area">
            <div class="status" id="status">⏳ Cargando...</div>

            <!-- D-Pad -->
            <div class="dpad">
                <button class="dpad-btn dpad-up">⬆️</button>
                <button class="dpad-btn dpad-left">⬅️</button>
                <button class="dpad-btn dpad-down">⬇️</button>
                <button class="dpad-btn dpad-right">➡️</button>
            </div>

            <!-- Botones de acción -->
            <div class="action-buttons">
                <div class="action-row">
                    <button class="btn-action btn-b" id="btnB">B</button>
                    <button class="btn-action btn-a" id="btnA">A</button>
                </div>
                <div class="shoulder-row">
                    <button class="shoulder-btn" id="btnL">L</button>
                    <button class="shoulder-btn" id="btnR">R</button>
                </div>
                <div class="shoulder-row">
                    <button class="shoulder-btn" id="btnSel">SEL</button>
                    <button class="shoulder-btn" id="btnStr">STR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://gbjs.org/gba.js"></script>
    <script>
        let emulator = null;
        const canvas = document.getElementById('gameCanvas');
        const status = document.getElementById('status');

        // Mapeo de teclas
        const buttonMap = {
            'btnUp': 6,      // UP
            'btnDown': 7,    // DOWN
            'btnLeft': 5,    // LEFT
            'btnRight': 4,   // RIGHT
            'btnA': 0,       // A
            'btnB': 1,       // B
            'btnL': 9,       // L
            'btnR': 8,       // R
            'btnSel': 2,     // SELECT
            'btnStr': 3      // START
        };

        function setupButton(selector, key) {
            const btn = document.querySelector(selector);
            if (!btn) return;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (emulator) emulator.keyboardHandler[key] = true;
                navigator.vibrate && navigator.vibrate(20);
            });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (emulator) emulator.keyboardHandler[key] = false;
            });

            btn.addEventListener('mousedown', () => {
                if (emulator) emulator.keyboardHandler[key] = true;
            });

            btn.addEventListener('mouseup', () => {
                if (emulator) emulator.keyboardHandler[key] = false;
            });

            btn.addEventListener('mouseleave', () => {
                if (emulator) emulator.keyboardHandler[key] = false;
            });
        }

        // Configurar todos los botones
        setupButton('.dpad-up', buttonMap.btnUp);
        setupButton('.dpad-down', buttonMap.btnDown);
        setupButton('.dpad-left', buttonMap.btnLeft);
        setupButton('.dpad-right', buttonMap.btnRight);
        setupButton('#btnA', buttonMap.btnA);
        setupButton('#btnB', buttonMap.btnB);
        setupButton('#btnL', buttonMap.btnL);
        setupButton('#btnR', buttonMap.btnR);
        setupButton('#btnSel', buttonMap.btnSel);
        setupButton('#btnStr', buttonMap.btnStr);

        // Teclado
        const keyMap = {
            'ArrowUp': buttonMap.btnUp,
            'ArrowDown': buttonMap.btnDown,
            'ArrowLeft': buttonMap.btnLeft,
            'ArrowRight': buttonMap.btnRight,
            'z': buttonMap.btnA,
            'Z': buttonMap.btnA,
            'x': buttonMap.btnB,
            'X': buttonMap.btnB,
            'q': buttonMap.btnL,
            'Q': buttonMap.btnL,
            'w': buttonMap.btnR,
            'W': buttonMap.btnR,
            'Enter': buttonMap.btnStr,
            ' ': buttonMap.btnSel
        };

        document.addEventListener('keydown', (e) => {
            if (emulator && keyMap[e.key] !== undefined) {
                emulator.keyboardHandler[keyMap[e.key]] = true;
                if (e.key === ' ') e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (emulator && keyMap[e.key] !== undefined) {
                emulator.keyboardHandler[keyMap[e.key]] = false;
                if (e.key === ' ') e.preventDefault();
            }
        });

        async function init() {
            try {
                status.textContent = '⏳ Cargando ROM...';

                const response = await fetch('Pokemon - FireRed Version (USA).gba');
                if (!response.ok) throw new Error(`Error: ${response.status}`);

                const romData = await response.arrayBuffer();

                emulator = new window.GameBoyAdvance();
                emulator.setCanvasScale(1);
                emulator.attachCanvas(canvas);
                emulator.loadRom(romData);

                // Game loop
                const loop = () => {
                    if (emulator) {
                        emulator.advanceFrame();
                    }
                    requestAnimationFrame(loop);
                };
                loop();

                status.textContent = '▶️ Pokémon Fire Red';
                status.classList.remove('error');

                // Pantalla completa en móviles
                if (window.innerWidth < 768) {
                    document.body.requestFullscreen?.().catch(() => {});
                }

            } catch (error) {
                console.error(error);
                status.textContent = '❌ ' + error.message;
                status.classList.add('error');
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
